<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Music for Mysha💞</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#12121f",
              "surface-container-lowest": "#0d0d19",
              "surface-bright": "#383846",
              "primary-container": "#ff4ecd",
              primary: "#ffaede",
              secondary: "#c9beff",
              "secondary-container": "#491ccd",
              tertiary: "#90da3f",
              surface: "#12121f",
              "on-surface": "#e3e0f3",
              "outline-variant": "#56404d",
              "surface-container": "#1f1e2b",
              "surface-container-high": "#292936",
              "surface-container-highest": "#343341",
              "surface-variant": "#343341",
              "on-surface-variant": "#dcbecd",
              outline: "#a48997",
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      /* Custom cursor */
      .cursor-ripple {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        background: radial-gradient(circle, #ff4ecd, #7a5cff);
        box-shadow:
          0 0 10px #ff4ecd,
          0 0 20px #7a5cff,
          0 0 40px #ff4ecd;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease-out;
      }
      .ripple-click {
        animation: rippleEffect 0.6s ease-out;
      }
      @keyframes rippleEffect {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(4);
          opacity: 0;
        }
      }

      /* Ambient orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(80px);
        opacity: 0.18;
        z-index: 0;
        animation: orbFloat 12s ease-in-out infinite;
      }
      .orb-1 {
        width: 400px;
        height: 400px;
        background: #ff4ecd;
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 350px;
        height: 350px;
        background: #7a5cff;
        bottom: -80px;
        right: -80px;
        animation-delay: -4s;
      }
      .orb-3 {
        width: 250px;
        height: 250px;
        background: #90da3f;
        top: 50%;
        left: 60%;
        animation-delay: -8s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -20px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 30px) scale(0.95);
        }
      }

      /* Glass */
      .glass-panel {
        backdrop-filter: blur(20px);
        background: rgba(18, 18, 31, 0.75);
        border: 1px solid rgba(255, 78, 205, 0.12);
      }
      .glass-card {
        backdrop-filter: blur(16px);
        background: rgba(31, 30, 43, 0.8);
        border: 1px solid rgba(255, 78, 205, 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-card:hover {
        border-color: rgba(255, 78, 205, 0.4);
        box-shadow: 0 0 30px rgba(255, 78, 205, 0.15);
        transform: translateY(-3px);
      }
      .glass-card.active-track {
        border-color: rgba(255, 78, 205, 0.6);
        box-shadow:
          0 0 40px rgba(255, 78, 205, 0.25),
          inset 0 0 20px rgba(255, 78, 205, 0.05);
        background: rgba(255, 78, 205, 0.08);
      }

      /* Album cover spin */
      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .cover-spin {
        animation: spin-slow 20s linear infinite;
      }
      .cover-spin.paused {
        animation-play-state: paused;
      }

      /* Vinyl groove rings */
      .vinyl-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.06);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      /* Waveform bars */
      .wave-bar {
        width: 3px;
        border-radius: 2px;
        background: linear-gradient(to top, #ff4ecd, #7a5cff);
        animation: wavePulse 1.2s ease-in-out infinite;
        transform-origin: bottom;
      }
      .wave-bar.paused {
        animation-play-state: paused;
      }
      @keyframes wavePulse {
        0%,
        100% {
          transform: scaleY(0.3);
        }
        50% {
          transform: scaleY(1);
        }
      }

      /* Progress bar */
      .progress-track {
        position: relative;
        height: 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        overflow: visible;
        transition: height 0.2s ease;
      }
      .progress-track:hover {
        height: 7px;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(to right, #ff4ecd, #7a5cff);
        transition: width 0.1s linear;
        position: relative;
      }
      .progress-fill::after {
        content: "";
        position: absolute;
        right: -5px;
        top: 50%;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #ffaede;
        box-shadow:
          0 0 10px #ff4ecd,
          0 0 20px rgba(255, 78, 205, 0.4);
        transform: translateY(-50%) scale(0.8);
        transition: transform 0.2s ease;
      }
      .progress-track:hover .progress-fill::after {
        transform: translateY(-50%) scale(1.3);
      }

      /* Volume slider */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 3px;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ff4ecd;
        box-shadow: 0 0 8px #ff4ecd;
        cursor: pointer;
      }

      /* Play button pulse */
      .play-btn-glow {
        position: relative;
      }
      .play-btn-glow::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff4ecd, #7a5cff);
        opacity: 0;
        z-index: -1;
        animation: playPulse 2s ease-in-out infinite;
      }
      .play-btn-glow.playing::before {
        opacity: 1;
      }
      @keyframes playPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.3;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.6;
        }
      }

      /* Track list number */
      .track-num {
        font-size: 11px;
        opacity: 0.4;
        font-variant-numeric: tabular-nums;
        min-width: 18px;
        text-align: center;
      }
      .glass-card.active-track .track-num {
        opacity: 0;
      }

      /* Page entry animation */
      .fade-in-up {
        opacity: 0;
        transform: translateY(24px);
        animation: fadeInUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Equalizer for active track in list */
      .eq-bars {
        display: none;
        gap: 2px;
        align-items: flex-end;
        height: 16px;
      }
      .eq-bar {
        width: 3px;
        border-radius: 1px;
        background: linear-gradient(to top, #ff4ecd, #7a5cff);
        animation: eqBounce 0.8s ease-in-out infinite;
      }
      .eq-bar:nth-child(2) {
        animation-delay: 0.15s;
      }
      .eq-bar:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes eqBounce {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 14px;
        }
      }
      .glass-card.active-track .eq-bars {
        display: flex;
      }
      .glass-card.active-track .eq-bars.paused .eq-bar {
        animation-play-state: paused;
      }

      /* Neon text gradient */
      .neon-text {
        background: linear-gradient(135deg, #ffaede, #c9beff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Cover photo placeholder gradient colors */
      .cover-1 {
        background: linear-gradient(
          135deg,
          #ff4ecd 0%,
          #7a5cff 50%,
          #0d0d19 100%
        );
      }
      .cover-2 {
        background: linear-gradient(
          135deg,
          #7a5cff 0%,
          #90da3f 50%,
          #0d0d19 100%
        );
      }
      .cover-3 {
        background: linear-gradient(
          135deg,
          #ff6b35 0%,
          #ff4ecd 50%,
          #7a5cff 100%
        );
      }
      .cover-4 {
        background: linear-gradient(
          135deg,
          #00d4ff 0%,
          #7a5cff 50%,
          #ff4ecd 100%
        );
      }
      .cover-5 {
        background: linear-gradient(
          135deg,
          #90da3f 0%,
          #00d4ff 50%,
          #7a5cff 100%
        );
      }

      .cover-shimmer {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          45deg,
          transparent 30%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 70%
        );
        animation: shimmer 3s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% {
          transform: translateX(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(300%) rotate(45deg);
        }
      }

      /* Mini cover in tracklist */
      .mini-cover {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .mini-cover-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
    </style>
  </head>

  <body
    class="bg-surface-dim text-on-surface font-body min-h-screen overflow-x-hidden"
  >
    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Custom cursor -->
    <div class="cursor-ripple"></div>

    <!-- Navbar placeholder -->
    <!-- <div id="navbar" class="relative z-50"></div> -->

    <!-- Background iframe (matches rest of site) -->
    <iframe
      src="background.html"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        pointer-events: none;
        z-index: 0;
      "
    ></iframe>

    <main
      class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16"
    >
      <!-- Page Header -->
      <div class="fade-in-up mb-12" style="animation-delay: 0.1s">
        <p
          class="text-sm font-label tracking-[0.3em] uppercase text-primary opacity-70 mb-2"
        >
          My Releases
        </p>
        <h1
          class="text-4xl sm:text-5xl font-headline font-bold italic neon-text leading-tight"
        >
          Music
        </h1>
        <p class="mt-3 text-on-surface-variant text-sm max-w-md">
          Only for you, Mysha — Click any song to play
        </p>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-5 gap-8 items-start">
        <!-- ═══════════════════════════════════════ -->
        <!-- LEFT: Main Player -->
        <!-- ═══════════════════════════════════════ -->
        <div class="xl:col-span-2 fade-in-up" style="animation-delay: 0.2s">
          <div class="glass-panel rounded-3xl p-8 sticky top-28">
            <!-- Album Art -->
            <div
              class="relative mx-auto mb-8"
              style="width: 220px; height: 220px"
            >
              <!-- Outer glow ring -->
              <div
                class="absolute inset-0 rounded-full"
                style="
                  background: radial-gradient(
                    circle,
                    rgba(255, 78, 205, 0.25) 0%,
                    rgba(122, 92, 255, 0.15) 40%,
                    transparent 70%
                  );
                  animation: playPulse 3s ease-in-out infinite;
                "
              ></div>
              <!-- Spinning border ring -->
              <div
                class="absolute inset-0 rounded-full cover-spin paused"
                id="spin-border"
                style="
                  background: conic-gradient(
                    from 0deg,
                    #ff4ecd,
                    #7a5cff,
                    #90da3f,
                    #ff4ecd
                  );
                  padding: 2px;
                  border-radius: 50%;
                  opacity: 0.7;
                "
              >
                <div
                  style="
                    width: 100%;
                    height: 100%;
                    border-radius: 50%;
                    background: #12121f;
                  "
                ></div>
              </div>

              <!-- Vinyl record base -->
              <div
                id="vinyl-disc"
                class="cover-spin paused absolute inset-2 rounded-full overflow-hidden shadow-2xl"
                style="box-shadow: 0 0 40px rgba(255, 78, 205, 0.4)"
              >
                <!-- Cover art fills the vinyl -->
                <div
                  id="main-cover"
                  class="cover-1 w-full h-full flex items-center justify-center relative"
                >
                  <div class="cover-shimmer"></div>
                  <span
                    id="main-cover-emoji"
                    style="font-size: 56px; z-index: 1; position: relative"
                    >🎵</span
                  >
                </div>

                <!-- Vinyl groove rings overlay (very subtle so cover art shows) -->
                <div
                  class="vinyl-ring"
                  style="
                    width: 60px;
                    height: 60px;
                    border-color: rgba(255, 255, 255, 0.04);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 90px;
                    height: 90px;
                    border-color: rgba(255, 255, 255, 0.035);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 120px;
                    height: 120px;
                    border-color: rgba(255, 255, 255, 0.03);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 150px;
                    height: 150px;
                    border-color: rgba(255, 255, 255, 0.025);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 180px;
                    height: 180px;
                    border-color: rgba(255, 255, 255, 0.02);
                  "
                ></div>

                <!-- Center shimmer dot (subtle, no black hole) -->
                <div
                  class="absolute top-1/2 left-1/2 w-3 h-3 rounded-full"
                  style="
                    transform: translate(-50%, -50%);
                    background: radial-gradient(
                      circle,
                      rgba(255, 78, 205, 0.6) 0%,
                      transparent 80%
                    );
                    box-shadow: 0 0 8px rgba(255, 78, 205, 0.5);
                  "
                ></div>
              </div>
            </div>

            <!-- Track Info -->
            <div class="text-center mb-6">
              <h2
                id="track-title"
                class="text-xl font-headline font-bold italic text-on-surface truncate"
              >
                Select a Track
              </h2>
              <p id="track-artist" class="text-sm text-primary mt-1 opacity-80">
                — Choose from the list →
              </p>
            </div>

            <!-- Waveform Visualizer -->
            <div class="flex items-center justify-center gap-1 mb-6 h-10">
              <div
                class="wave-bar paused"
                style="height: 24px; animation-delay: 0s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 32px; animation-delay: 0.1s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 20px; animation-delay: 0.2s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 36px; animation-delay: 0.3s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 28px; animation-delay: 0.4s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 16px; animation-delay: 0.5s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 40px; animation-delay: 0.6s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 24px; animation-delay: 0.7s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 32px; animation-delay: 0.8s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 18px; animation-delay: 0.9s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 36px; animation-delay: 1s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 26px; animation-delay: 1.1s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 22px; animation-delay: 1.2s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 38px; animation-delay: 1.3s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 30px; animation-delay: 1.4s"
              ></div>
            </div>

            <!-- Progress Bar -->
            <div class="mb-3">
              <div
                class="progress-track"
                id="progress-bar"
                onclick="seekTo(event)"
              >
                <div
                  class="progress-fill"
                  id="progress-fill"
                  style="width: 0%"
                ></div>
              </div>
            </div>
            <div
              class="flex justify-between text-xs text-on-surface-variant mb-6"
            >
              <span id="time-current">0:00</span>
              <span id="time-total">0:00</span>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-between mb-6">
              <!-- Shuffle -->
              <button
                id="btn-shuffle"
                onclick="toggleShuffle()"
                class="w-9 h-9 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all"
                title="Shuffle"
              >
                <span
                  class="material-symbols-outlined text-on-surface-variant"
                  style="font-size: 20px"
                  >shuffle</span
                >
              </button>

              <!-- Prev -->
              <button
                onclick="prevTrack()"
                class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all hover:scale-110"
              >
                <span
                  class="material-symbols-outlined text-on-surface"
                  style="font-size: 26px"
                  >skip_previous</span
                >
              </button>

              <!-- Play/Pause -->
              <button
                id="play-btn"
                onclick="togglePlay()"
                class="play-btn-glow w-16 h-16 rounded-full flex items-center justify-center transition-all hover:scale-110 active:scale-95"
                style="
                  background: linear-gradient(135deg, #ff4ecd, #7a5cff);
                  box-shadow: 0 0 30px rgba(255, 78, 205, 0.5);
                "
              >
                <span
                  id="play-icon"
                  class="material-symbols-outlined text-white"
                  style="
                    font-size: 32px;
                    font-variation-settings:
                      &quot;FILL&quot; 1,
                      &quot;wght&quot; 400,
                      &quot;GRAD&quot; 0,
                      &quot;opsz&quot; 24;
                  "
                  >play_arrow</span
                >
              </button>

              <!-- Next -->
              <button
                onclick="nextTrack()"
                class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all hover:scale-110"
              >
                <span
                  class="material-symbols-outlined text-on-surface"
                  style="font-size: 26px"
                  >skip_next</span
                >
              </button>

              <!-- Repeat -->
              <button
                id="btn-repeat"
                onclick="toggleRepeat()"
                class="w-9 h-9 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all"
                title="Repeat"
              >
                <span
                  class="material-symbols-outlined text-on-surface-variant"
                  style="font-size: 20px"
                  >repeat</span
                >
              </button>
            </div>

            <!-- Volume -->
            <div class="flex items-center gap-3">
              <span
                class="material-symbols-outlined text-on-surface-variant"
                style="font-size: 18px"
                >volume_down</span
              >
              <input
                type="range"
                id="volume-slider"
                min="0"
                max="100"
                value="80"
                oninput="setVolume(this.value)"
                class="flex-1"
                style="accent-color: #ff4ecd"
              />
              <span
                class="material-symbols-outlined text-on-surface-variant"
                style="font-size: 18px"
                >volume_up</span
              >
            </div>

            <!-- Hidden audio element -->
            <audio id="audio-player" preload="metadata"></audio>
          </div>
        </div>

        <!-- ═══════════════════════════════════════ -->
        <!-- RIGHT: Track List -->
        <!-- ═══════════════════════════════════════ -->
        <div
          class="xl:col-span-3 space-y-3 fade-in-up"
          style="animation-delay: 0.3s"
          id="track-list"
        >
          <!-- Tracks will be injected by JS -->
        </div>
      </div>
    </main>

    <script>
      // ─────────────────────────────────────────
      // TRACK DATA — Edit these to match your actual music files
      // ─────────────────────────────────────────
      const tracks = [
        {
          id: 1,
          title: "First Sight, First Love – Mysha 👩‍❤️‍💋‍👩",
          artist: "Asadullah Atik",
          genre: " Hindi",
          duration: "3:23",
          file: "m1.mp3", // Change to your actual file path
          coverClass: "cover-1",
          coverEmoji: "🌌",
          coverImage: "p1.jpg", // Set to image path like "covers/track1.jpg" if you have cover images
          year: "2026",
        },
        {
          id: 2,
          title: "My First Love Story ❤️",
          artist: "Asadullah Atik",
          genre: " Bangla",
          duration: "3:16",
          file: "m2.mp3",
          coverClass: "cover-2",
          coverEmoji: "🌿",
          coverImage: "p2.jpeg",
          year: "2026",
        },
        {
          id: 3,
          title: "Mysha My First Love Story (Remix) 💗",
          artist: "Asadullah Atik",
          genre: " Bangla",
          duration: "3:34",
          file: "m3.mp3",
          coverClass: "cover-3",
          coverEmoji: "🔥",
          coverImage: "p3.jpeg",
          year: "2026",
        },
        {
          id: 4,
          title: "Mysha-An Unfinished Story 💞",
          artist: "Asadullah Atik",
          genre: " Hindi",
          duration: "4:24",
          file: "m4.mp3",
          coverClass: "cover-4",
          coverEmoji: "🌊",
          coverImage: "p4.jpeg",
          year: "2026",
        },
        {
          id: 5,
          title: "Rise Again",
          artist: "Asadullah Atik",
          genre: "Dance",
          duration: "3:29",
          file: "m5.mp3",
          coverClass: "cover-5",
          coverEmoji: "⚡",
          coverImage: "p5.jpg",
          year: "2026",
        },
      ];

      // ─────────────────────────────────────────
      // State
      // ─────────────────────────────────────────
      let currentIndex = -1;
      let isPlaying = false;
      let isShuffle = false;
      let repeatMode = 0; // 0=off, 1=all, 2=one

      const audio = document.getElementById("audio-player");
      const playBtn = document.getElementById("play-btn");
      const playIcon = document.getElementById("play-icon");
      const vinylDisc = document.getElementById("vinyl-disc");
      const mainCover = document.getElementById("main-cover");
      const mainCoverEmoji = document.getElementById("main-cover-emoji");
      const trackTitle = document.getElementById("track-title");
      const trackArtist = document.getElementById("track-artist");
      const progressFill = document.getElementById("progress-fill");
      const timeCurrent = document.getElementById("time-current");
      const timeTotal = document.getElementById("time-total");
      const waveBars = document.querySelectorAll(".wave-bar");
      const trackListEl = document.getElementById("track-list");

      // ─────────────────────────────────────────
      // Render track list
      // ─────────────────────────────────────────
      function renderTrackList() {
        trackListEl.innerHTML = "";
        tracks.forEach((track, idx) => {
          const el = document.createElement("div");
          el.className =
            "glass-card rounded-2xl p-4 cursor-pointer flex items-center gap-4";
          el.id = `track-item-${idx}`;
          el.style.animationDelay = `${0.35 + idx * 0.07}s`;
          el.classList.add("fade-in-up");
          el.onclick = () => loadTrack(idx);

          // Build cover HTML
          let coverHTML = "";
          if (track.coverImage) {
            coverHTML = `<img src="${track.coverImage}" alt="${track.title}" class="w-full h-full object-cover rounded-lg" />`;
          } else {
            coverHTML = `<div class="mini-cover-inner ${track.coverClass} rounded-lg w-full h-full flex items-center justify-center" style="font-size:22px;">${track.coverEmoji}</div>`;
          }

          el.innerHTML = `
            <div class="mini-cover rounded-lg overflow-hidden flex-shrink-0">${coverHTML}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <p class="font-label font-semibold text-on-surface truncate text-sm">${track.title}</p>
                <div class="eq-bars">
                  <div class="eq-bar" style="height:4px;"></div>
                  <div class="eq-bar" style="height:8px;"></div>
                  <div class="eq-bar" style="height:4px;"></div>
                </div>
              </div>
              <p class="text-xs text-on-surface-variant mt-0.5">${track.artist} · <span class="opacity-60">${track.genre}</span></p>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0">
              <span class="track-num text-on-surface-variant font-mono">${String(idx + 1).padStart(2, "0")}</span>
              <span class="text-xs text-on-surface-variant opacity-60 font-mono">${track.duration}</span>
              <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-primary/20 transition-all" onclick="event.stopPropagation(); likeTrack(${idx}, this)">
                <span class="material-symbols-outlined like-icon" style="font-size:18px; color:rgba(227,224,243,0.4);">favorite</span>
              </button>
            </div>
          `;
          trackListEl.appendChild(el);
        });
      }

      // ─────────────────────────────────────────
      // Load & Play
      // ─────────────────────────────────────────
      function loadTrack(idx) {
        // Deactivate previous
        if (currentIndex >= 0) {
          const prev = document.getElementById(`track-item-${currentIndex}`);
          if (prev) {
            prev.classList.remove("active-track");
            prev
              .querySelectorAll(".eq-bar")
              .forEach((b) => (b.style.animationPlayState = ""));
          }
        }

        currentIndex = idx;
        const track = tracks[idx];

        // Update main player cover
        if (track.coverImage) {
          mainCover.style.backgroundImage = `url('${track.coverImage}')`;
          mainCover.style.backgroundSize = "cover";
          mainCover.style.backgroundPosition = "center";
          mainCover.className =
            "w-full h-full flex items-center justify-center relative";
          mainCoverEmoji.style.display = "none";
          // Hide vinyl rings when real cover art is shown
          document
            .querySelectorAll(".vinyl-ring")
            .forEach((r) => (r.style.opacity = "0"));
        } else {
          mainCover.style.backgroundImage = "";
          mainCover.className = `${track.coverClass} w-full h-full flex items-center justify-center relative`;
          mainCoverEmoji.textContent = track.coverEmoji;
          mainCoverEmoji.style.display = "";
          // Show vinyl rings for gradient covers
          document
            .querySelectorAll(".vinyl-ring")
            .forEach((r) => (r.style.opacity = "1"));
        }

        trackTitle.textContent = track.title;
        trackArtist.textContent = `${track.artist} · ${track.year}`;

        // Load audio
        audio.src = track.file;
        audio.volume = document.getElementById("volume-slider").value / 100;
        audio.load();

        // Activate track in list
        const el = document.getElementById(`track-item-${idx}`);
        if (el) el.classList.add("active-track");

        // Play
        playAudio();
      }

      function playAudio() {
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              setPlayingUI(true);
            })
            .catch(() => {
              // Autoplay blocked — still show playing state visually
              setPlayingUI(true);
            });
        }
      }

      function setPlayingUI(playing) {
        isPlaying = playing;
        playIcon.textContent = playing ? "pause" : "play_arrow";
        playIcon.style.fontVariationSettings = playing
          ? '"FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24'
          : '"FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24';
        playBtn.classList.toggle("playing", playing);

        // Vinyl
        if (playing) {
          vinylDisc.classList.remove("paused");
          const spinBorder = document.getElementById("spin-border");
          if (spinBorder) spinBorder.classList.remove("paused");
        } else {
          vinylDisc.classList.add("paused");
          const spinBorder = document.getElementById("spin-border");
          if (spinBorder) spinBorder.classList.add("paused");
        }

        // Waveform
        waveBars.forEach((b) => b.classList.toggle("paused", !playing));

        // EQ bars in list
        if (currentIndex >= 0) {
          const el = document.getElementById(`track-item-${currentIndex}`);
          if (el) {
            el.querySelectorAll(".eq-bar").forEach((b) => {
              b.style.animationPlayState = playing ? "running" : "paused";
            });
          }
        }
      }

      function togglePlay() {
        if (currentIndex === -1) {
          loadTrack(0);
          return;
        }
        if (isPlaying) {
          audio.pause();
          setPlayingUI(false);
        } else {
          audio.play().catch(() => {});
          setPlayingUI(true);
        }
      }

      // ─────────────────────────────────────────
      // Next / Prev
      // ─────────────────────────────────────────
      function nextTrack() {
        if (tracks.length === 0) return;
        let next;
        if (isShuffle) {
          next = Math.floor(Math.random() * tracks.length);
        } else {
          next = (currentIndex + 1) % tracks.length;
        }
        loadTrack(next);
      }

      function prevTrack() {
        if (audio.currentTime > 3) {
          audio.currentTime = 0;
          return;
        }
        let prev = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(prev);
      }

      // ─────────────────────────────────────────
      // Audio events
      // ─────────────────────────────────────────
      audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + "%";
        timeCurrent.textContent = formatTime(audio.currentTime);
      });

      audio.addEventListener("loadedmetadata", () => {
        timeTotal.textContent = formatTime(audio.duration);
      });

      audio.addEventListener("ended", () => {
        if (repeatMode === 2) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        } else if (repeatMode === 1 || currentIndex < tracks.length - 1) {
          nextTrack();
        } else {
          setPlayingUI(false);
        }
      });

      function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      function seekTo(e) {
        if (!audio.duration) return;
        const bar = document.getElementById("progress-bar");
        const rect = bar.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
      }

      function setVolume(val) {
        audio.volume = val / 100;
      }

      // ─────────────────────────────────────────
      // Shuffle / Repeat
      // ─────────────────────────────────────────
      function toggleShuffle() {
        isShuffle = !isShuffle;
        const btn = document.getElementById("btn-shuffle");
        const icon = btn.querySelector(".material-symbols-outlined");
        icon.style.color = isShuffle ? "#ff4ecd" : "";
        btn.style.boxShadow = isShuffle ? "0 0 12px rgba(255,78,205,0.4)" : "";
      }

      function toggleRepeat() {
        repeatMode = (repeatMode + 1) % 3;
        const btn = document.getElementById("btn-repeat");
        const icon = btn.querySelector(".material-symbols-outlined");
        if (repeatMode === 0) {
          icon.textContent = "repeat";
          icon.style.color = "";
        } else if (repeatMode === 1) {
          icon.textContent = "repeat";
          icon.style.color = "#ff4ecd";
        } else {
          icon.textContent = "repeat_one";
          icon.style.color = "#ff4ecd";
        }
      }

      // ─────────────────────────────────────────
      // Like
      // ─────────────────────────────────────────
      function likeTrack(idx, btn) {
        const icon = btn.querySelector(".like-icon");
        btn.classList.toggle("liked");
        if (btn.classList.contains("liked")) {
          icon.style.color = "#ff4ecd";
          icon.style.fontVariationSettings =
            '"FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24';
          icon.style.filter = "drop-shadow(0 0 6px #ff4ecd)";
        } else {
          icon.style.color = "rgba(227,224,243,0.4)";
          icon.style.fontVariationSettings =
            '"FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24';
          icon.style.filter = "";
        }
      }

      // ─────────────────────────────────────────
      // Cursor ripple
      // ─────────────────────────────────────────
      const cursor = document.querySelector(".cursor-ripple");
      document.addEventListener("mousemove", (e) => {
        cursor.style.top = e.clientY + "px";
        cursor.style.left = e.clientX + "px";
      });
      document.addEventListener("click", () => {
        cursor.classList.add("ripple-click");
        setTimeout(() => cursor.classList.remove("ripple-click"), 600);
      });

      // ─────────────────────────────────────────
      // Navbar
      // ─────────────────────────────────────────
      fetch("navbar.html")
        .then((r) => r.text())
        .then((d) => {
          document.getElementById("navbar").innerHTML = d;
        })
        .catch(() => {});

      // Auth check (matches your site)
      function checkAuth() {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        if (!isLoggedIn) window.location.href = "login.html";
      }

      // ─────────────────────────────────────────
      // Init
      // ─────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        checkAuth();
        renderTrackList();
      });
    </script>
  </body>
</html>
