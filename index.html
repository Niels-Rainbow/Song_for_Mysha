<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>🎧 Song for Mysha 💞</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#12121f",
              "surface-container-lowest": "#0d0d19",
              "surface-bright": "#383846",
              "primary-container": "#ff4ecd",
              primary: "#ffaede",
              secondary: "#c9beff",
              "secondary-container": "#491ccd",
              tertiary: "#90da3f",
              surface: "#12121f",
              "on-surface": "#e3e0f3",
              "outline-variant": "#56404d",
              "surface-container": "#1f1e2b",
              "surface-container-high": "#292936",
              "surface-container-highest": "#343341",
              "surface-variant": "#343341",
              "on-surface-variant": "#dcbecd",
              outline: "#a48997",
            },
            fontFamily: {
              headline: ["Noto Serif"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      canvas#love-bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Aurora Blobs ── */
      .aurora-blob {
        position: fixed;
        pointer-events: none;
        border-radius: 50%;
        filter: blur(90px);
        mix-blend-mode: screen;
      }
      .aurora-blob-1 {
        width: 60vw;
        height: 60vw;
        background: radial-gradient(
          circle,
          #ff4ecd 0%,
          #7a5cff 60%,
          transparent 100%
        );
        top: -15vw;
        left: -10vw;
        opacity: 0.12;
        animation: auroraA 18s ease-in-out infinite;
      }
      .aurora-blob-2 {
        width: 50vw;
        height: 50vw;
        background: radial-gradient(
          circle,
          #7a5cff 0%,
          #ff4ecd 50%,
          transparent 100%
        );
        bottom: -10vw;
        right: -5vw;
        opacity: 0.12;
        animation: auroraB 22s ease-in-out infinite;
      }
      .aurora-blob-3 {
        width: 40vw;
        height: 40vw;
        background: radial-gradient(
          circle,
          #ff6eb5 0%,
          #5c3aff 70%,
          transparent 100%
        );
        top: 30%;
        left: 35%;
        opacity: 0.07;
        animation: auroraA 28s ease-in-out infinite reverse;
      }

      @keyframes auroraA {
        0% {
          transform: translate(0%, 0%) rotate(0deg) scale(1);
        }
        25% {
          transform: translate(3%, -2%) rotate(1deg) scale(1.02);
        }
        50% {
          transform: translate(-2%, 3%) rotate(-1deg) scale(0.98);
        }
        75% {
          transform: translate(2%, 1%) rotate(0.5deg) scale(1.01);
        }
        100% {
          transform: translate(0%, 0%) rotate(0deg) scale(1);
        }
      }
      @keyframes auroraB {
        0% {
          transform: translate(0%, 0%) rotate(0deg) scale(1);
        }
        33% {
          transform: translate(-4%, 2%) rotate(-2deg) scale(1.03);
        }
        66% {
          transform: translate(3%, -3%) rotate(1deg) scale(0.97);
        }
        100% {
          transform: translate(0%, 0%) rotate(0deg) scale(1);
        }
      }
      /* Custom cursor */
      .cursor-ripple {
        position: fixed;
        top: 0;
        left: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        background: radial-gradient(circle, #ff4ecd, #7a5cff);
        box-shadow:
          0 0 10px #ff4ecd,
          0 0 20px #7a5cff,
          0 0 40px #ff4ecd;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease-out;
      }
      .ripple-click {
        animation: rippleEffect 0.6s ease-out;
      }
      @keyframes rippleEffect {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) scale(4);
          opacity: 0;
        }
      }

      /* Ambient orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(80px);
        opacity: 0.18;
        z-index: 0;
        animation: orbFloat 12s ease-in-out infinite;
      }
      .orb-1 {
        width: 400px;
        height: 400px;
        background: #ff4ecd;
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 350px;
        height: 350px;
        background: #7a5cff;
        bottom: -80px;
        right: -80px;
        animation-delay: -4s;
      }
      .orb-3 {
        width: 250px;
        height: 250px;
        background: #90da3f;
        top: 50%;
        left: 60%;
        animation-delay: -8s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -20px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 30px) scale(0.95);
        }
      }

      /* Glass */
      .glass-panel {
        backdrop-filter: blur(20px);
        background: rgba(18, 18, 31, 0.75);
        border: 1px solid rgba(255, 78, 205, 0.12);
      }
      .glass-card {
        backdrop-filter: blur(16px);
        background: rgba(31, 30, 43, 0.8);
        border: 1px solid rgba(255, 78, 205, 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-card:hover {
        border-color: rgba(255, 78, 205, 0.4);
        box-shadow: 0 0 30px rgba(255, 78, 205, 0.15);
        transform: translateY(-3px);
      }
      .glass-card.active-track {
        border-color: rgba(255, 78, 205, 0.6);
        box-shadow:
          0 0 40px rgba(255, 78, 205, 0.25),
          inset 0 0 20px rgba(255, 78, 205, 0.05);
        background: rgba(255, 78, 205, 0.08);
      }

      /* Album cover spin */
      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .cover-spin {
        animation: spin-slow 20s linear infinite;
      }
      .cover-spin.paused {
        animation-play-state: paused;
      }

      /* Vinyl groove rings */
      .vinyl-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.06);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      /* Waveform bars */
      .wave-bar {
        width: 3px;
        border-radius: 2px;
        background: linear-gradient(to top, #ff4ecd, #7a5cff);
        animation: wavePulse 1.2s ease-in-out infinite;
        transform-origin: bottom;
      }
      .wave-bar.paused {
        animation-play-state: paused;
      }
      @keyframes wavePulse {
        0%,
        100% {
          transform: scaleY(0.3);
        }
        50% {
          transform: scaleY(1);
        }
      }

      /* Progress bar */
      .progress-track {
        position: relative;
        height: 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        overflow: visible;
        transition: height 0.2s ease;
      }
      .progress-track:hover {
        height: 7px;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(to right, #ff4ecd, #7a5cff);
        transition: width 0.1s linear;
        position: relative;
      }
      .progress-fill::after {
        content: "";
        position: absolute;
        right: -5px;
        top: 50%;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #ffaede;
        box-shadow:
          0 0 10px #ff4ecd,
          0 0 20px rgba(255, 78, 205, 0.4);
        transform: translateY(-50%) scale(0.8);
        transition: transform 0.2s ease;
      }
      .progress-track:hover .progress-fill::after {
        transform: translateY(-50%) scale(1.3);
      }

      /* Volume slider */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 3px;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.1);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ff4ecd;
        box-shadow: 0 0 8px #ff4ecd;
        cursor: pointer;
      }

      /* Play button pulse */
      .play-btn-glow {
        position: relative;
      }
      .play-btn-glow::before {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff4ecd, #7a5cff);
        opacity: 0;
        z-index: -1;
        animation: playPulse 2s ease-in-out infinite;
      }
      .play-btn-glow.playing::before {
        opacity: 1;
      }
      @keyframes playPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.3;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.6;
        }
      }

      /* Track list number */
      .track-num {
        font-size: 11px;
        opacity: 0.4;
        font-variant-numeric: tabular-nums;
        min-width: 18px;
        text-align: center;
      }
      .glass-card.active-track .track-num {
        opacity: 0;
      }

      /* Page entry animation */
      .fade-in-up {
        opacity: 0;
        transform: translateY(24px);
        animation: fadeInUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Equalizer for active track in list */
      .eq-bars {
        display: none;
        gap: 2px;
        align-items: flex-end;
        height: 16px;
      }
      .eq-bar {
        width: 3px;
        border-radius: 1px;
        background: linear-gradient(to top, #ff4ecd, #7a5cff);
        animation: eqBounce 0.8s ease-in-out infinite;
      }
      .eq-bar:nth-child(2) {
        animation-delay: 0.15s;
      }
      .eq-bar:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes eqBounce {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 14px;
        }
      }
      .glass-card.active-track .eq-bars {
        display: flex;
      }
      .glass-card.active-track .eq-bars.paused .eq-bar {
        animation-play-state: paused;
      }

      /* Neon text gradient */
      .neon-text {
        background: linear-gradient(135deg, #ffaede, #c9beff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Cover photo placeholder gradient colors */
      .cover-1 {
        background: linear-gradient(
          135deg,
          #ff4ecd 0%,
          #7a5cff 50%,
          #0d0d19 100%
        );
      }
      .cover-2 {
        background: linear-gradient(
          135deg,
          #7a5cff 0%,
          #90da3f 50%,
          #0d0d19 100%
        );
      }
      .cover-3 {
        background: linear-gradient(
          135deg,
          #ff6b35 0%,
          #ff4ecd 50%,
          #7a5cff 100%
        );
      }
      .cover-4 {
        background: linear-gradient(
          135deg,
          #00d4ff 0%,
          #7a5cff 50%,
          #ff4ecd 100%
        );
      }
      .cover-5 {
        background: linear-gradient(
          135deg,
          #90da3f 0%,
          #00d4ff 50%,
          #7a5cff 100%
        );
      }

      .cover-shimmer {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          45deg,
          transparent 30%,
          rgba(255, 255, 255, 0.08) 50%,
          transparent 70%
        );
        animation: shimmer 3s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% {
          transform: translateX(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(300%) rotate(45deg);
        }
      }

      /* Mini cover in tracklist */
      .mini-cover {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .mini-cover-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
    </style>
  </head>

  <body
    class="bg-surface-dim text-on-surface font-body min-h-screen overflow-x-hidden"
  >
    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Custom cursor -->
    <div class="cursor-ripple"></div>

    <!-- Navbar placeholder -->
    <!-- <div id="navbar" class="relative z-50"></div> -->

    <!-- Background iframe (matches rest of site) -->
    <!-- Aurora blobs (CSS layer) -->
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>

    <!-- Canvas layer -->
    <canvas id="love-bg-canvas"></canvas>

    <main
      class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-16"
    >
      <!-- Page Header -->
      <div class="fade-in-up mb-12" style="animation-delay: 0.1s">
        <p
          class="text-sm font-label tracking-[0.3em] uppercase text-primary opacity-70 mb-2"
        >
          My Releases
        </p>
        <h1
          class="text-4xl sm:text-5xl font-headline font-bold italic neon-text leading-tight"
        >
          Music 🎧
        </h1>
        <p class="mt-3 text-on-surface-variant text-sm max-w-md">
          Only for you, Mysha — Click any song to play
        </p>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-5 gap-8 items-start">
        <!-- ═══════════════════════════════════════ -->
        <!-- LEFT: Main Player -->
        <!-- ═══════════════════════════════════════ -->
        <div class="xl:col-span-2 fade-in-up" style="animation-delay: 0.2s">
          <div class="glass-panel rounded-3xl p-8 sticky top-28">
            <!-- Album Art -->
            <div
              class="relative mx-auto mb-8"
              style="width: 220px; height: 220px"
            >
              <!-- Outer glow ring -->
              <div
                class="absolute inset-0 rounded-full"
                style="
                  background: radial-gradient(
                    circle,
                    rgba(255, 78, 205, 0.25) 0%,
                    rgba(122, 92, 255, 0.15) 40%,
                    transparent 70%
                  );
                  animation: playPulse 3s ease-in-out infinite;
                "
              ></div>
              <!-- Spinning border ring -->
              <div
                class="absolute inset-0 rounded-full cover-spin paused"
                id="spin-border"
                style="
                  background: conic-gradient(
                    from 0deg,
                    #ff4ecd,
                    #7a5cff,
                    #90da3f,
                    #ff4ecd
                  );
                  padding: 2px;
                  border-radius: 50%;
                  opacity: 0.7;
                "
              >
                <div
                  style="
                    width: 100%;
                    height: 100%;
                    border-radius: 50%;
                    background: #12121f;
                  "
                ></div>
              </div>

              <!-- Vinyl record base -->
              <div
                id="vinyl-disc"
                class="cover-spin paused absolute inset-2 rounded-full overflow-hidden shadow-2xl"
                style="box-shadow: 0 0 40px rgba(255, 78, 205, 0.4)"
              >
                <!-- Cover art fills the vinyl -->
                <div
                  id="main-cover"
                  class="cover-1 w-full h-full flex items-center justify-center relative"
                >
                  <div class="cover-shimmer"></div>
                  <span
                    id="main-cover-emoji"
                    style="font-size: 56px; z-index: 1; position: relative"
                    >🎵</span
                  >
                </div>

                <!-- Vinyl groove rings overlay (very subtle so cover art shows) -->
                <div
                  class="vinyl-ring"
                  style="
                    width: 60px;
                    height: 60px;
                    border-color: rgba(255, 255, 255, 0.04);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 90px;
                    height: 90px;
                    border-color: rgba(255, 255, 255, 0.035);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 120px;
                    height: 120px;
                    border-color: rgba(255, 255, 255, 0.03);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 150px;
                    height: 150px;
                    border-color: rgba(255, 255, 255, 0.025);
                  "
                ></div>
                <div
                  class="vinyl-ring"
                  style="
                    width: 180px;
                    height: 180px;
                    border-color: rgba(255, 255, 255, 0.02);
                  "
                ></div>

                <!-- Center shimmer dot (subtle, no black hole) -->
                <div
                  class="absolute top-1/2 left-1/2 w-3 h-3 rounded-full"
                  style="
                    transform: translate(-50%, -50%);
                    background: radial-gradient(
                      circle,
                      rgba(255, 78, 205, 0.6) 0%,
                      transparent 80%
                    );
                    box-shadow: 0 0 8px rgba(255, 78, 205, 0.5);
                  "
                ></div>
              </div>
            </div>

            <!-- Track Info -->
            <div class="text-center mb-6">
              <h2
                id="track-title"
                class="text-xl font-headline font-bold italic text-on-surface truncate"
              >
                Select a Track
              </h2>
              <p id="track-artist" class="text-sm text-primary mt-1 opacity-80">
                — Choose from the list →
              </p>
            </div>

            <!-- Waveform Visualizer -->
            <div class="flex items-center justify-center gap-1 mb-6 h-10">
              <div
                class="wave-bar paused"
                style="height: 24px; animation-delay: 0s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 32px; animation-delay: 0.1s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 20px; animation-delay: 0.2s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 36px; animation-delay: 0.3s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 28px; animation-delay: 0.4s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 16px; animation-delay: 0.5s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 40px; animation-delay: 0.6s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 24px; animation-delay: 0.7s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 32px; animation-delay: 0.8s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 18px; animation-delay: 0.9s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 36px; animation-delay: 1s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 26px; animation-delay: 1.1s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 22px; animation-delay: 1.2s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 38px; animation-delay: 1.3s"
              ></div>
              <div
                class="wave-bar paused"
                style="height: 30px; animation-delay: 1.4s"
              ></div>
            </div>

            <!-- Progress Bar -->
            <div class="mb-3">
              <div
                class="progress-track"
                id="progress-bar"
                onclick="seekTo(event)"
              >
                <div
                  class="progress-fill"
                  id="progress-fill"
                  style="width: 0%"
                ></div>
              </div>
            </div>
            <div
              class="flex justify-between text-xs text-on-surface-variant mb-6"
            >
              <span id="time-current">0:00</span>
              <span id="time-total">0:00</span>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-between mb-6">
              <!-- Shuffle -->
              <button
                id="btn-shuffle"
                onclick="toggleShuffle()"
                class="w-9 h-9 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all"
                title="Shuffle"
              >
                <span
                  class="material-symbols-outlined text-on-surface-variant"
                  style="font-size: 20px"
                  >shuffle</span
                >
              </button>

              <!-- Prev -->
              <button
                onclick="prevTrack()"
                class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all hover:scale-110"
              >
                <span
                  class="material-symbols-outlined text-on-surface"
                  style="font-size: 26px"
                  >skip_previous</span
                >
              </button>

              <!-- Play/Pause -->
              <button
                id="play-btn"
                onclick="togglePlay()"
                class="play-btn-glow w-16 h-16 rounded-full flex items-center justify-center transition-all hover:scale-110 active:scale-95"
                style="
                  background: linear-gradient(135deg, #ff4ecd, #7a5cff);
                  box-shadow: 0 0 30px rgba(255, 78, 205, 0.5);
                "
              >
                <span
                  id="play-icon"
                  class="material-symbols-outlined text-white"
                  style="
                    font-size: 32px;
                    font-variation-settings:
                      &quot;FILL&quot; 1,
                      &quot;wght&quot; 400,
                      &quot;GRAD&quot; 0,
                      &quot;opsz&quot; 24;
                  "
                  >play_arrow</span
                >
              </button>

              <!-- Next -->
              <button
                onclick="nextTrack()"
                class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-primary/10 transition-all hover:scale-110"
              >
                <span
                  class="material-symbols-outlined text-on-surface"
                  style="font-size: 26px"
                  >skip_next</span
                >
              </button>

              <!-- Repeat -->
              <button

      // ─────────────────────────────────────────

      // ─────────────────────────────────────────
      let currentIndex = -1;

      const waveBars = document.querySelectorAll(".wave-bar");

      // ─────────────────────────────────────────
      // Render track list
      // ─────────────────────────────────────────
      function renderTrackList() {
        trackListEl.innerHTML = "";
        tracks.forEach((track, idx) => {
          const el = document.createElement("div");
          el.className =
            "glass-card rounded-2xl p-4 cursor-pointer flex items-center gap-4";
          el.id = `track-item-${idx}`;
          el.style.animationDelay = `${0.35 + idx * 0.07}s`;
          el.classList.add("fade-in-up");
          el.onclick = () => loadTrack(idx);

          // Build cover HTML
          let coverHTML = "";
          if (track.coverImage) {
            coverHTML = `<img src="${track.coverImage}" alt="${track.title}" class="w-full h-full object-cover rounded-lg" />`;
          } else {
            coverHTML = `<div class="mini-cover-inner ${track.coverClass} rounded-lg w-full h-full flex items-center justify-center" style="font-size:22px;">${track.coverEmoji}</div>`;
          }

          el.innerHTML = `
            <div class="mini-cover rounded-lg overflow-hidden flex-shrink-0">${coverHTML}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <p class="font-label font-semibold text-on-surface truncate text-sm">${track.title}</p>
                <div class="eq-bars">
                  <div class="eq-bar" style="height:4px;"></div>
                  <div class="eq-bar" style="height:8px;"></div>
                  <div class="eq-bar" style="height:4px;"></div>
                </div>
              </div>
              <p class="text-xs text-on-surface-variant mt-0.5">${track.artist} · <span class="opacity-60">${track.genre}</span></p>
            </div>
            <div class="flex items-center gap-3 flex-shrink-0">
              <span class="track-num text-on-surface-variant font-mono">${String(idx + 1).padStart(2, "0")}</span>
              <span class="text-xs text-on-surface-variant opacity-60 font-mono">${track.duration}</span>
              <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-primary/20 transition-all" onclick="event.stopPropagation(); likeTrack(${idx}, this)">
                <span class="material-symbols-outlined like-icon" style="font-size:18px; color:rgba(227,224,243,0.4);">favorite</span>
              </button>
              <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-secondary/20 transition-all" onclick="event.stopPropagation(); downloadTrack(${idx})" title="Download">
                <span class="material-symbols-outlined" style="font-size:18px; color:rgba(201,190,255,0.5); font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">download</span>
              </button>
            </div>
          `;
          trackListEl.appendChild(el);
        });
      }

      // ─────────────────────────────────────────
      // Load & Play
      // ─────────────────────────────────────────
      function loadTrack(idx) {
        // Deactivate previous
        if (currentIndex >= 0) {
          const prev = document.getElementById(`track-item-${currentIndex}`);
          if (prev) {
            prev.classList.remove("active-track");
            prev
              .querySelectorAll(".eq-bar")
              .forEach((b) => (b.style.animationPlayState = ""));
          }
        }

        currentIndex = idx;
        updateDownloadBtn();
        const track = tracks[idx];

        // Update main player cover
        if (track.coverImage) {
          mainCover.style.backgroundImage = `url('${track.coverImage}')`;
          mainCover.style.backgroundSize = "cover";
          mainCover.style.backgroundPosition = "center";
          mainCover.className =
            "w-full h-full flex items-center justify-center relative";
          mainCoverEmoji.style.display = "none";
          // Hide vinyl rings when real cover art is shown
          document
            .querySelectorAll(".vinyl-ring")
            .forEach((r) => (r.style.opacity = "0"));
        } else {
          mainCover.style.backgroundImage = "";
          mainCover.className = `${track.coverClass} w-full h-full flex items-center justify-center relative`;
          mainCoverEmoji.textContent = track.coverEmoji;
          mainCoverEmoji.style.display = "";
          // Show vinyl rings for gradient covers
          document
            .querySelectorAll(".vinyl-ring")
            .forEach((r) => (r.style.opacity = "1"));
        }

        trackTitle.textContent = track.title;
        trackArtist.textContent = `${track.artist} · ${track.year}`;

        // Load audio
        audio.src = track.file;
        audio.volume = document.getElementById("volume-slider").value / 100;
        audio.load();

        // Activate track in list
        const el = document.getElementById(`track-item-${idx}`);
        if (el) el.classList.add("active-track");

        // Play
        playAudio();
      }

      function playAudio() {
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              setPlayingUI(true);
            })
            .catch(() => {
              // Autoplay blocked — still show playing state visually
              setPlayingUI(true);
            });
        }
      }

      function setPlayingUI(playing) {
        isPlaying = playing;
        playIcon.textContent = playing ? "pause" : "play_arrow";
        playIcon.style.fontVariationSettings = playing
          ? '"FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24'
          : '"FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24';
        playBtn.classList.toggle("playing", playing);

        // Vinyl
        if (playing) {
          vinylDisc.classList.remove("paused");
          const spinBorder = document.getElementById("spin-border");
          if (spinBorder) spinBorder.classList.remove("paused");
        } else {
          vinylDisc.classList.add("paused");
          const spinBorder = document.getElementById("spin-border");
          if (spinBorder) spinBorder.classList.add("paused");
        }

        // Waveform
        waveBars.forEach((b) => b.classList.toggle("paused", !playing));

        // EQ bars in list
        if (currentIndex >= 0) {
          const el = document.getElementById(`track-item-${currentIndex}`);
          if (el) {
            el.querySelectorAll(".eq-bar").forEach((b) => {
              b.style.animationPlayState = playing ? "running" : "paused";
            });
          }
        }
      }

      function togglePlay() {
        if (currentIndex === -1) {
          loadTrack(0);
          return;
        }
        if (isPlaying) {
          audio.pause();
          setPlayingUI(false);
        } else {
          audio.play().catch(() => {});
          setPlayingUI(true);
        }
      }

      // ─────────────────────────────────────────
      // Next / Prev
      // ─────────────────────────────────────────
      function nextTrack() {
        if (tracks.length === 0) return;
        let next;
        if (isShuffle) {
          next = Math.floor(Math.random() * tracks.length);
        } else {
          next = (currentIndex + 1) % tracks.length;
        }
        loadTrack(next);
      }

      function prevTrack() {
        if (audio.currentTime > 3) {
          audio.currentTime = 0;
          return;
        }
        let prev = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(prev);
      }

      // ─────────────────────────────────────────
      // Audio events
      // ─────────────────────────────────────────
      audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + "%";
        timeCurrent.textContent = formatTime(audio.currentTime);
      });

      audio.addEventListener("loadedmetadata", () => {
        timeTotal.textContent = formatTime(audio.duration);
      });

      audio.addEventListener("ended", () => {
        if (repeatMode === 2) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        } else if (repeatMode === 1 || currentIndex < tracks.length - 1) {
          nextTrack();
        } else {
          setPlayingUI(false);
        }
      });

      function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      function seekTo(e) {
        if (!audio.duration) return;
        const bar = document.getElementById("progress-bar");
        const rect = bar.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
      }

      function setVolume(val) {
        audio.volume = val / 100;
      }

      // ─────────────────────────────────────────
      // Shuffle / Repeat
      // ─────────────────────────────────────────
      function toggleShuffle() {
        isShuffle = !isShuffle;
        const btn = document.getElementById("btn-shuffle");
        const icon = btn.querySelector(".material-symbols-outlined");
        icon.style.color = isShuffle ? "#ff4ecd" : "";
        btn.style.boxShadow = isShuffle ? "0 0 12px rgba(255,78,205,0.4)" : "";
      }

      function toggleRepeat() {
        repeatMode = (repeatMode + 1) % 3;
        const btn = document.getElementById("btn-repeat");
        const icon = btn.querySelector(".material-symbols-outlined");
        if (repeatMode === 0) {
          icon.textContent = "repeat";
          icon.style.color = "";
        } else if (repeatMode === 1) {
          icon.textContent = "repeat";
          icon.style.color = "#ff4ecd";
        } else {
          icon.textContent = "repeat_one";
          icon.style.color = "#ff4ecd";
        }
      }

      // ─────────────────────────────────────────
      // Like
      // ─────────────────────────────────────────
      function likeTrack(idx, btn) {
        const icon = btn.querySelector(".like-icon");
        btn.classList.toggle("liked");
        if (btn.classList.contains("liked")) {
          icon.style.color = "#ff4ecd";
          icon.style.fontVariationSettings =
            '"FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24';
          icon.style.filter = "drop-shadow(0 0 6px #ff4ecd)";
        } else {
          icon.style.color = "rgba(227,224,243,0.4)";
          icon.style.fontVariationSettings =
            '"FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24';
          icon.style.filter = "";
        }
      }

      // ─────────────────────────────────────────
      // Download
      // ─────────────────────────────────────────
      function downloadTrack(idx) {
        const track = tracks[idx];
        const a = document.createElement("a");
        a.href = track.file;
        a.download = `${track.title} - ${track.artist}.mp3`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      function downloadCurrentTrack() {
        if (currentIndex < 0) return;
        downloadTrack(currentIndex);
      }

      // Update download button state when track changes
      function updateDownloadBtn() {
        const btn = document.getElementById("download-btn");
        const label = document.getElementById("download-btn-label");
        if (!btn || !label) return;
        if (currentIndex >= 0) {
          const track = tracks[currentIndex];
          btn.disabled = false;
          label.textContent = `Download "${track.title.replace(/\s*[🎵🎧❤️💞💗👩‍❤️‍💋‍👩💔🌹✨]+/g, "").trim()}"`;
          btn.style.borderColor = "rgba(255,78,205,0.5)";
        } else {
          btn.disabled = true;
          label.textContent = "Select a track to download";
          btn.style.borderColor = "rgba(255,78,205,0.25)";
        }
      }

      // ─────────────────────────────────────────
      // Cursor ripple (desktop only)
      // ─────────────────────────────────────────
      const cursor = document.querySelector(".cursor-ripple");
      const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;
      if (isTouchDevice) {
        cursor.style.display = "none";
      } else {
        document.addEventListener("mousemove", (e) => {
          cursor.style.top = e.clientY + "px";
          cursor.style.left = e.clientX + "px";
        });
        document.addEventListener("click", () => {
          cursor.classList.add("ripple-click");
          setTimeout(() => cursor.classList.remove("ripple-click"), 600);
        });
      }

      // ─────────────────────────────────────────
      // Navbar
      // ─────────────────────────────────────────
      // fetch("navbar.html")
      //   .then((r) => r.text())
      //   .then((d) => {
      //     document.getElementById("navbar").innerHTML = d;
      //   })
      //   .catch(() => {});

      // ─────────────────────────────────────────
      // Init
      // ─────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        renderTrackList();
      });

      (function () {
        const canvas = document.getElementById("love-bg-canvas");
        const ctx = canvas.getContext("2d");

        let W, H;
        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", () => {
          resize();
          initAll();
        });

        /* ── Palette ── */
        const PINK = "rgba(255,78,205,";
        const PURPLE = "rgba(122,92,255,";
        const ROSE = "rgba(255,110,181,";
        const LAVNDR = "rgba(201,190,255,";

        /* ════════════════════════════════
       1. FLOATING HEARTS
    ════════════════════════════════ */
        const HEART_COUNT = 28;
        let hearts = [];

        function heartPath(x, y, size) {
          ctx.beginPath();
          ctx.moveTo(x, y + size * 0.3);
          ctx.bezierCurveTo(
            x,
            y,
            x - size * 0.5,
            y,
            x - size * 0.5,
            y + size * 0.3,
          );
          ctx.bezierCurveTo(
            x - size * 0.5,
            y + size * 0.6,
            x,
            y + size * 0.9,
            x,
            y + size,
          );
          ctx.bezierCurveTo(
            x,
            y + size * 0.9,
            x + size * 0.5,
            y + size * 0.6,
            x + size * 0.5,
            y + size * 0.3,
          );
          ctx.bezierCurveTo(x + size * 0.5, y, x, y, x, y + size * 0.3);
          ctx.closePath();
        }

        function mkHeart(scatter) {
          const size = 6 + Math.random() * 18;
          return {
            x: Math.random() * W,
            y: scatter ? Math.random() * H * 1.2 : H + size * 2,
            size,
            alpha: 0.08 + Math.random() * 0.25,
            speed: 0.25 + Math.random() * 0.55,
            drift: (Math.random() - 0.5) * 0.35,
            wobble: Math.random() * Math.PI * 2,
            wobbleSpeed: 0.008 + Math.random() * 0.015,
            pulse: Math.random() * Math.PI * 2,
            pulseSpeed: 0.02 + Math.random() * 0.02,
            color:
              Math.random() < 0.6 ? PINK : Math.random() < 0.5 ? PURPLE : ROSE,
            glow: Math.random() < 0.3,
          };
        }

        function initHearts() {
          hearts = Array.from({ length: HEART_COUNT }, () => mkHeart(true));
        }

        function updateHearts() {
          for (let h of hearts) {
            h.y -= h.speed;
            h.x += h.drift + Math.sin(h.wobble) * 0.4;
            h.wobble += h.wobbleSpeed;
            h.pulse += h.pulseSpeed;

            const scale = 1 + Math.sin(h.pulse) * 0.08;
            const drawSize = h.size * scale;

            ctx.save();
            if (h.glow) {
              ctx.shadowColor = h.color + "0.8)";
              ctx.shadowBlur = 14;
            }
            ctx.fillStyle = h.color + h.alpha + ")";
            heartPath(h.x, h.y - drawSize, drawSize);
            ctx.fill();
            ctx.restore();

            if (h.y < -h.size * 3) Object.assign(h, mkHeart(false));
          }
        }

        /* ════════════════════════════════
       2. FIREFLY PARTICLES
    ════════════════════════════════ */
        const PARTICLE_COUNT = 55;
        let particles = [];

        function mkParticle(scatter) {
          return {
            x: Math.random() * W,
            y: scatter ? Math.random() * H : H + 10,
            r: 1 + Math.random() * 3,
            alpha: 0.15 + Math.random() * 0.5,
            vx: (Math.random() - 0.5) * 0.5,
            vy: -(0.2 + Math.random() * 0.6),
            life: 0,
            maxLife: 180 + Math.random() * 200,
            color:
              Math.random() < 0.5
                ? PINK
                : Math.random() < 0.5
                  ? PURPLE
                  : LAVNDR,
            twinkle: Math.random() * Math.PI * 2,
            twinkleSpd: 0.03 + Math.random() * 0.05,
          };
        }

        function initParticles() {
          particles = Array.from({ length: PARTICLE_COUNT }, () =>
            mkParticle(true),
          );
        }

        function updateParticles() {
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx + Math.sin(p.twinkle) * 0.15;
            p.y += p.vy;
            p.life++;
            p.twinkle += p.twinkleSpd;

            const t = p.life / p.maxLife;
            const fade = t < 0.1 ? t / 0.1 : t > 0.8 ? 1 - (t - 0.8) / 0.2 : 1;
            const a = p.alpha * fade * (0.7 + Math.sin(p.twinkle) * 0.3);

            ctx.save();
            ctx.shadowColor = p.color + "0.9)";
            ctx.shadowBlur = p.r * 4;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color + a + ")";
            ctx.fill();
            ctx.restore();

            if (p.life >= p.maxLife || p.y < -10)
              particles[i] = mkParticle(false);
          }
        }

        /* ════════════════════════════════
       3. 4-POINT SPARKLE STARS
    ════════════════════════════════ */
        const SPARKLE_COUNT = 20;
        let sparkles = [];

        function mkSparkle(scatter) {
          return {
            x: Math.random() * W,
            y: scatter ? Math.random() * H : H + 20,
            size: 2 + Math.random() * 5,
            alpha: 0,
            maxAlpha: 0.2 + Math.random() * 0.5,
            phase: "in",
            speed: 0.01 + Math.random() * 0.02,
            vy: -(0.15 + Math.random() * 0.3),
            color: Math.random() < 0.5 ? PINK : LAVNDR,
            rot: Math.random() * Math.PI,
            rotSpd: (Math.random() - 0.5) * 0.03,
            holdT: 0,
          };
        }

        function drawSparkle(s) {
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.rot);
          ctx.shadowColor = s.color + "0.8)";
          ctx.shadowBlur = s.size * 3;
          ctx.fillStyle = s.color + s.alpha + ")";
          ctx.beginPath();
          for (let i = 0; i < 4; i++) {
            const a = (i / 4) * Math.PI * 2;
            ctx.lineTo(Math.cos(a) * s.size, Math.sin(a) * s.size);
            const m = a + Math.PI / 4;
            ctx.lineTo(
              Math.cos(m) * s.size * 0.15,
              Math.sin(m) * s.size * 0.15,
            );
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        function initSparkles() {
          sparkles = Array.from({ length: SPARKLE_COUNT }, () =>
            mkSparkle(true),
          );
        }

        function updateSparkles() {
          for (let i = 0; i < sparkles.length; i++) {
            const s = sparkles[i];
            s.y += s.vy;
            s.rot += s.rotSpd;

            if (s.phase === "in") {
              s.alpha += s.speed;
              if (s.alpha >= s.maxAlpha) {
                s.alpha = s.maxAlpha;
                s.phase = "hold";
                s.holdT = 40 + Math.random() * 60;
              }
            } else if (s.phase === "hold") {
              if (--s.holdT <= 0) s.phase = "out";
            } else {
              s.alpha -= s.speed;
              if (s.alpha <= 0 || s.y < -20) {
                sparkles[i] = mkSparkle(false);
                continue;
              }
            }
            drawSparkle(s);
          }
        }

        /* ════════════════════════════════
       4. SOFT GLOW ORBS
    ════════════════════════════════ */
        const ORB_COUNT = 6;
        let orbs = [];

        function mkOrb() {
          return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: 60 + Math.random() * 120,
            alpha: 0.02 + Math.random() * 0.05,
            vx: (Math.random() - 0.5) * 0.18,
            vy: (Math.random() - 0.5) * 0.18,
            color: Math.random() < 0.5 ? PINK : PURPLE,
            pulse: Math.random() * Math.PI * 2,
            pulseSpd: 0.004 + Math.random() * 0.006,
          };
        }

        function initOrbs() {
          orbs = Array.from({ length: ORB_COUNT }, mkOrb);
        }

        function updateOrbs() {
          for (const o of orbs) {
            o.x += o.vx;
            o.y += o.vy;
            o.pulse += o.pulseSpd;

            if (o.x < -o.r) o.x = W + o.r;
            if (o.x > W + o.r) o.x = -o.r;
            if (o.y < -o.r) o.y = H + o.r;
            if (o.y > H + o.r) o.y = -o.r;

            const a = o.alpha * (0.85 + Math.sin(o.pulse) * 0.15);
            const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
            grad.addColorStop(0, o.color + a + ")");
            grad.addColorStop(0.5, o.color + a * 0.4 + ")");
            grad.addColorStop(1, o.color + "0)");

            ctx.beginPath();
            ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
          }
        }

        /* ════════════════════════════════
       5. GLOWING BEZIER LOVE LINES
    ════════════════════════════════ */
        let lineTimer = 0;
        let activeLine = null;

        function spawnLine() {
          const x1 = Math.random() * W;
          const y1 = H * 0.3 + Math.random() * H * 0.5;
          const x2 = x1 + (Math.random() - 0.5) * 300;
          const y2 = y1 - 80 - Math.random() * 150;
          activeLine = {
            x1,
            y1,
            x2,
            y2,
            progress: 0,
            alpha: 0,
            phase: "in",
            holdT: 0,
            color: Math.random() < 0.5 ? PINK : PURPLE,
            cp: {
              x: (x1 + x2) / 2 + (Math.random() - 0.5) * 100,
              y: Math.min(y1, y2) - 60 - Math.random() * 80,
            },
          };
        }

        function updateLines() {
          lineTimer++;
          if (lineTimer > 200 && !activeLine) {
            lineTimer = 0;
            spawnLine();
          }
          if (!activeLine) return;

          const l = activeLine;
          if (l.phase === "in") {
            l.alpha += 0.015;
            l.progress += 0.018;
            if (l.progress >= 1) {
              l.progress = 1;
              l.phase = "hold";
              l.holdT = 60;
            }
          } else if (l.phase === "hold") {
            if (--l.holdT <= 0) l.phase = "out";
          } else {
            l.alpha -= 0.012;
            if (l.alpha <= 0) {
              activeLine = null;
              return;
            }
          }

          const steps = Math.floor(l.progress * 40);
          ctx.save();
          ctx.strokeStyle = l.color + Math.min(l.alpha, 0.25) + ")";
          ctx.lineWidth = 1;
          ctx.shadowColor = l.color + "0.6)";
          ctx.shadowBlur = 6;
          ctx.beginPath();
          for (let i = 0; i <= steps; i++) {
            const t = i / 40;
            const bx =
              (1 - t) * (1 - t) * l.x1 +
              2 * (1 - t) * t * l.cp.x +
              t * t * l.x2;
            const by =
              (1 - t) * (1 - t) * l.y1 +
              2 * (1 - t) * t * l.cp.y +
              t * t * l.y2;
            i === 0 ? ctx.moveTo(bx, by) : ctx.lineTo(bx, by);
          }
          ctx.stroke();
          ctx.restore();
        }

        /* ── Main Loop ── */
        function initAll() {
          initHearts();
          initParticles();
          initSparkles();
          initOrbs();
        }
        initAll();

        function loop() {
          ctx.clearRect(0, 0, W, H);
          updateOrbs();
          updateLines();
          updateParticles();
          updateSparkles();
          updateHearts();
          requestAnimationFrame(loop);
        }
        loop();
      })();
    </script>
  </body>
</html>
